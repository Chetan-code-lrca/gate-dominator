<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="620" fill="#0f0f1a" rx="16"/>

  <!-- Title -->
  <text x="450" y="44" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="700">🏆 GATE Dominator — System Architecture</text>
  <text x="450" y="66" text-anchor="middle" fill="#a0a0c0" font-size="13">Notion MCP + Claude AI · Autonomous GATE 2028 Prep Agent</text>

  <!-- USER NODE -->
  <rect x="370" y="90" width="160" height="54" rx="10" fill="#6366f1" stroke="#818cf8" stroke-width="2"/>
  <text x="450" y="112" text-anchor="middle" fill="white" font-size="14" font-weight="600">👤 User (Chetan)</text>
  <text x="450" y="132" text-anchor="middle" fill="#c7d2fe" font-size="11">Pastes answers / commands</text>

  <!-- Arrow User → Claude -->
  <line x1="450" y1="144" x2="450" y2="172" stroke="#818cf8" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <!-- CLAUDE NODE -->
  <rect x="340" y="172" width="220" height="54" rx="10" fill="#7c3aed" stroke="#a78bfa" stroke-width="2"/>
  <text x="450" y="194" text-anchor="middle" fill="white" font-size="14" font-weight="600">🤖 Claude AI Agent</text>
  <text x="450" y="214" text-anchor="middle" fill="#ddd6fe" font-size="11">Scores · Teaches · Decides</text>

  <!-- Arrow Claude → MCP -->
  <line x1="450" y1="226" x2="450" y2="254" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrow-violet)"/>

  <!-- NOTION MCP NODE -->
  <rect x="340" y="254" width="220" height="54" rx="10" fill="#0891b2" stroke="#22d3ee" stroke-width="2"/>
  <text x="450" y="276" text-anchor="middle" fill="white" font-size="14" font-weight="600">🔌 Notion MCP</text>
  <text x="450" y="296" text-anchor="middle" fill="#cffafe" font-size="11">Read · Write · Update · Create</text>

  <!-- Notion Workspace Box -->
  <rect x="60" y="350" width="780" height="220" rx="14" fill="#0d1117" stroke="#22c55e" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="450" y="374" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="600">🗂️ Notion Workspace</text>

  <!-- Branch lines from MCP to 4 nodes -->
  <!-- MCP splits at y=308, then goes down to y=390 -->
  <line x1="450" y1="308" x2="450" y2="340" stroke="#22d3ee" stroke-width="2"/>
  <line x1="200" y1="340" x2="700" y2="340" stroke="#22d3ee" stroke-width="1.5"/>
  <line x1="200" y1="340" x2="200" y2="390" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-teal)"/>
  <line x1="390" y1="340" x2="390" y2="390" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-teal)"/>
  <line x1="580" y1="340" x2="580" y2="390" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-teal)"/>
  <line x1="700" y1="340" x2="700" y2="390" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-teal)"/>

  <!-- Syllabus DB -->
  <rect x="100" y="390" width="200" height="80" rx="10" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="200" y="414" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="600">📚 Syllabus DB</text>
  <text x="200" y="432" text-anchor="middle" fill="#86efac" font-size="10">Topics · Marks · Status</text>
  <text x="200" y="448" text-anchor="middle" fill="#86efac" font-size="10">Difficulty · Notes</text>
  <text x="200" y="462" text-anchor="middle" fill="#bbf7d0" font-size="10" font-style="italic">10 topics (Wk1+2)</text>

  <!-- Quiz Bank -->
  <rect x="295" y="390" width="200" height="80" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="395" y="414" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="600">🧠 Quiz Bank</text>
  <text x="395" y="432" text-anchor="middle" fill="#93c5fd" font-size="10">30 questions · All Mastered</text>
  <text x="395" y="448" text-anchor="middle" fill="#93c5fd" font-size="10">Your Answer · Result</text>
  <text x="395" y="462" text-anchor="middle" fill="#bfdbfe" font-size="10" font-style="italic">Linked to Syllabus</text>

  <!-- Analysis Pages -->
  <rect x="490" y="390" width="200" height="80" rx="10" fill="#451a03" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="590" y="410" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="600">🔍 Analysis Pages</text>
  <text x="590" y="428" text-anchor="middle" fill="#fcd34d" font-size="10">Scorecard · Breakdowns</text>
  <text x="590" y="444" text-anchor="middle" fill="#fcd34d" font-size="10">GATE Traps · Bonus Qs</text>
  <text x="590" y="462" text-anchor="middle" fill="#fde68a" font-size="10" font-style="italic">Auto-created per topic</text>

  <!-- Dashboard -->
  <rect x="610" y="390" width="190" height="80" rx="10" fill="#500724" stroke="#ec4899" stroke-width="1.5"/>
  <text x="705" y="410" text-anchor="middle" fill="#f472b6" font-size="13" font-weight="600">📊 Dashboard</text>
  <text x="705" y="428" text-anchor="middle" fill="#f9a8d4" font-size="10">Progress · Badges · Quotes</text>
  <text x="705" y="444" text-anchor="middle" fill="#f9a8d4" font-size="10">Marks Counter</text>
  <text x="705" y="462" text-anchor="middle" fill="#fbcfe8" font-size="10" font-style="italic">Victory block · Next Up</text>

  <!-- Mastery flow arrow -->
  <line x1="450" y1="510" x2="450" y2="550" stroke="#f97316" stroke-width="2" marker-end="url(#arrow-orange)" stroke-dasharray="5,3"/>
  <rect x="310" y="550" width="280" height="40" rx="8" fill="#431407" stroke="#f97316" stroke-width="1.5"/>
  <text x="450" y="566" text-anchor="middle" fill="#fb923c" font-size="12" font-weight="600">✅ Score ≥ 4/5 → MASTERED</text>
  <text x="450" y="582" text-anchor="middle" fill="#fdba74" font-size="10">Topic flips Done · Badge added · Quote rotates</text>

  <!-- Re-attempt loop arrow -->
  <path d="M 100 430 Q 40 430 40 300 Q 40 200 340 199" stroke="#ef4444" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <text x="22" y="320" fill="#f87171" font-size="10" text-anchor="middle" transform="rotate(-90, 22, 320)">Re-attempt loop</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#818cf8"/>
    </marker>
    <marker id="arrow-violet" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-teal" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f97316"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Week labels -->
  <text x="450" y="608" text-anchor="middle" fill="#4b5563" font-size="11">Week 1: 56/56 marks · Week 2: 41 marks in progress · Total: 97/100 GATE CS marks</text>

</svg>
